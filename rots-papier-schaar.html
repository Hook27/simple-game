<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rots-Papier-Schaar</title>
  <link rel="stylesheet" href="stijl.css">
  <style>
    /* ── Totaal scorebord ──────────────────── */
    .score-rij {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .score-blok {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 10px;
      padding: 6px 16px;
      text-align: center;
      min-width: 82px;
    }

    .score-blok.gewonnen-blok { border-color: rgba(56,161,105,0.4); }
    .score-blok.verloren-blok { border-color: rgba(229,62,62,0.35); }
    .score-blok.gelijk-blok   { border-color: rgba(236,201,75,0.35); }

    .score-label  { color: #90cdf4; font-size: 0.62rem; letter-spacing: 1.2px; text-transform: uppercase; }
    .score-waarde { color: #fff; font-size: 1.2rem; font-weight: 700; line-height: 1.2; }

    .score-blok.gewonnen-blok .score-waarde { color: #68d391; }
    .score-blok.verloren-blok .score-waarde { color: #fc8181; }
    .score-blok.gelijk-blok   .score-waarde { color: #f6e05e; }

    /* ── Drie ronde-kaarten ────────────────── */
    .rondes-rij {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 460px;
    }

    .ronde-kaart {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 10px 6px 8px;
      text-align: center;
      opacity: 0.38;
      transition: border-color 0.35s, background 0.35s, box-shadow 0.35s, opacity 0.35s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .ronde-kaart.actief {
      opacity: 1;
      border-color: #4299e1;
      background: rgba(66,153,225,0.07);
      box-shadow: 0 0 16px rgba(66,153,225,0.22);
    }

    .ronde-kaart.actief .kaart-label { color: #90cdf4; }

    .ronde-kaart.win {
      opacity: 1;
      border-color: #38a169;
      background: rgba(56,161,105,0.1);
      animation: kaart-pop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .ronde-kaart.verlies {
      opacity: 1;
      border-color: #e53e3e;
      background: rgba(229,62,62,0.08);
      animation: kaart-pop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .ronde-kaart.gelijk {
      opacity: 1;
      border-color: #ecc94b;
      background: rgba(236,201,75,0.08);
      animation: kaart-pop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes kaart-pop {
      0%   { transform: scale(0.88); }
      100% { transform: scale(1); }
    }

    /* ── Kaart-inhoud ──────────────────────── */
    .kaart-label {
      font-size: 0.6rem;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      margin-bottom: 8px;
      font-weight: 600;
      transition: color 0.3s;
    }

    .kaart-emojis {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      margin-bottom: 8px;
    }

    .kaart-emoji-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .kaart-emoji {
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      line-height: 1;
      min-height: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .kaart-emoji.schud { animation: kaart-schud 0.28s ease-in-out; }

    @keyframes kaart-schud {
      0%,100% { transform: translateY(0); }
      40%     { transform: translateY(-6px) rotate(-8deg); }
      70%     { transform: translateY(-3px) rotate(5deg); }
    }

    .kaart-rol {
      font-size: 0.55rem;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .kaart-vs-teken {
      font-size: 0.6rem;
      font-weight: 900;
      color: rgba(255,255,255,0.18);
      padding-bottom: 16px;
      align-self: center;
    }

    .kaart-scheidslijn {
      width: 80%;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin-bottom: 7px;
    }

    .kaart-uitslag {
      font-size: 0.68rem;
      font-weight: 700;
      min-height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px 10px;
      border-radius: 50px;
      letter-spacing: 0.3px;
    }

    .kaart-uitslag.win     { color: #68d391; background: rgba(56,161,105,0.18); }
    .kaart-uitslag.verlies { color: #fc8181; background: rgba(229,62,62,0.15); }
    .kaart-uitslag.gelijk  { color: #f6e05e; background: rgba(236,201,75,0.14); }

    /* ── Keuze-knoppen ─────────────────────── */
    .keuze-rij {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      justify-content: center;
    }

    .keuze-knop {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 11px 18px;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, background 0.18s, box-shadow 0.18s;
      color: #e2e8f0;
      min-width: 84px;
    }

    .keuze-knop:hover {
      transform: translateY(-4px) scale(1.04);
      border-color: rgba(99,179,237,0.6);
      background: rgba(99,179,237,0.1);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25), 0 0 0 1px rgba(99,179,237,0.2);
    }

    .keuze-knop:active   { transform: scale(0.96); }
    .keuze-knop:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .keuze-knop.geselecteerd {
      border-color: #4299e1;
      background: rgba(66,153,225,0.15);
    }

    .keuze-emoji { font-size: 1.9rem; line-height: 1; transition: transform 0.2s; }
    .keuze-knop:hover .keuze-emoji { transform: scale(1.15) rotate(-5deg); }
    .keuze-naam  { font-size: 0.8rem; font-weight: 600; }

    /* ── Eindstand (inline, na 3 rondes) ───── */
    .eindstand {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 100%;
      max-width: 460px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 18px 20px 16px;
      text-align: center;
    }

    .eindstand.toon {
      display: flex;
      animation: eindstand-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes eindstand-in {
      from { transform: translateY(16px) scale(0.94); opacity: 0; }
      to   { transform: translateY(0)    scale(1);    opacity: 1; }
    }

    .eindstand.win     { border-color: rgba(56,161,105,0.45);  background: rgba(56,161,105,0.07); }
    .eindstand.verlies { border-color: rgba(229,62,62,0.4);    background: rgba(229,62,62,0.06); }
    .eindstand.gelijk  { border-color: rgba(236,201,75,0.4);   background: rgba(236,201,75,0.06); }

    .eindstand-emoji { font-size: 2.4rem; line-height: 1; }
    .eindstand-titel { font-size: 1.15rem; font-weight: 800; color: #fff; }
    .eindstand-sub   { font-size: 0.78rem; color: #90cdf4; margin-bottom: 4px; }

    @media (max-width: 400px) {
      .keuze-knop { min-width: 72px; padding: 9px 12px; }
      .keuze-emoji { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🎮 <span>Spelletjes</span></a>
      <a href="geheugen-spel.html" class="nav-tab">Geheugen spel</a>
      <a href="vier-op-rij.html" class="nav-tab">Vier op een rij</a>
      <a href="rots-papier-schaar.html" class="nav-tab actief">Rots-Papier-Schaar</a>
    </div>
  </nav>

  <div class="pagina">
    <h1 class="spel-titel">Rots-Papier-Schaar</h1>
    <p class="spel-subtitel">Best of Three — wie wint 2 van de 3 rondes?</p>

    <!-- Totaal scorebord (match-wins over alle potjes) -->
    <div class="score-rij">
      <div class="score-blok gewonnen-blok">
        <div class="score-label">Jij gewonnen</div>
        <div class="score-waarde" id="score-jij">0</div>
      </div>
      <div class="score-blok gelijk-blok">
        <div class="score-label">Gelijk</div>
        <div class="score-waarde" id="score-gelijk">0</div>
      </div>
      <div class="score-blok verloren-blok">
        <div class="score-label">AI gewonnen</div>
        <div class="score-waarde" id="score-ai">0</div>
      </div>
    </div>

    <!-- Drie ronde-kaarten naast elkaar -->
    <div class="rondes-rij">

      <div class="ronde-kaart actief" id="kaart-0">
        <div class="kaart-label">Ronde 1</div>
        <div class="kaart-emojis">
          <div class="kaart-emoji-slot">
            <div class="kaart-emoji" id="emoji-jij-0">❓</div>
            <div class="kaart-rol">Jij</div>
          </div>
          <div class="kaart-vs-teken">vs</div>
          <div class="kaart-emoji-slot">
            <div class="kaart-emoji" id="emoji-ai-0">❓</div>
            <div class="kaart-rol">AI</div>
          </div>
        </div>
        <div class="kaart-scheidslijn"></div>
        <div class="kaart-uitslag" id="uitslag-0"></div>
      </div>

      <div class="ronde-kaart" id="kaart-1">
        <div class="kaart-label">Ronde 2</div>
        <div class="kaart-emojis">
          <div class="kaart-emoji-slot">
            <div class="kaart-emoji" id="emoji-jij-1">❓</div>
            <div class="kaart-rol">Jij</div>
          </div>
          <div class="kaart-vs-teken">vs</div>
          <div class="kaart-emoji-slot">
            <div class="kaart-emoji" id="emoji-ai-1">❓</div>
            <div class="kaart-rol">AI</div>
          </div>
        </div>
        <div class="kaart-scheidslijn"></div>
        <div class="kaart-uitslag" id="uitslag-1"></div>
      </div>

      <div class="ronde-kaart" id="kaart-2">
        <div class="kaart-label">Ronde 3</div>
        <div class="kaart-emojis">
          <div class="kaart-emoji-slot">
            <div class="kaart-emoji" id="emoji-jij-2">❓</div>
            <div class="kaart-rol">Jij</div>
          </div>
          <div class="kaart-vs-teken">vs</div>
          <div class="kaart-emoji-slot">
            <div class="kaart-emoji" id="emoji-ai-2">❓</div>
            <div class="kaart-rol">AI</div>
          </div>
        </div>
        <div class="kaart-scheidslijn"></div>
        <div class="kaart-uitslag" id="uitslag-2"></div>
      </div>

    </div>

    <!-- Keuze-knoppen: altijd zichtbaar -->
    <div class="keuze-rij" id="keuze-rij">
      <button class="keuze-knop" data-keuze="rots">
        <span class="keuze-emoji">✊</span>
        <span class="keuze-naam">Rots</span>
      </button>
      <button class="keuze-knop" data-keuze="papier">
        <span class="keuze-emoji">🖐️</span>
        <span class="keuze-naam">Papier</span>
      </button>
      <button class="keuze-knop" data-keuze="schaar">
        <span class="keuze-emoji">✌️</span>
        <span class="keuze-naam">Schaar</span>
      </button>
    </div>

    <!-- Eindstand (verschijnt na ronde 3) -->
    <div class="eindstand" id="eindstand">
      <div class="eindstand-emoji" id="eindstand-emoji"></div>
      <div class="eindstand-titel" id="eindstand-titel"></div>
      <div class="eindstand-sub"   id="eindstand-sub"></div>
      <button class="knop" id="opnieuw">Opnieuw spelen</button>
    </div>

    <!-- Reset knop -->
    <div style="margin-top:10px">
      <button class="knop gevaar" id="reset">Totaal resetten</button>
    </div>
  </div>

  <script>
    const KEUZES = ['rots', 'papier', 'schaar'];
    const EMOJI  = { rots: '✊', papier: '🖐️', schaar: '✌️' };

    // Totaal over alle potjes
    let matchJij = 0, matchGelijk = 0, matchAI = 0;

    // Huidige best-of-3
    let rondeNummer  = 1;   // 1–3
    let rondeResults = [];  // 'win' | 'verlies' | 'gelijk'
    let bezig        = false;

    /* ── Hulpfuncties ─────────────────────── */
    function bepaalWinnaar(jij, ai) {
      if (jij === ai) return 'gelijk';
      if ((jij === 'rots'   && ai === 'schaar') ||
          (jij === 'papier' && ai === 'rots')   ||
          (jij === 'schaar' && ai === 'papier')) return 'win';
      return 'verlies';
    }

    function setBolKnoppen(enabled) {
      document.querySelectorAll('.keuze-knop').forEach(k => { k.disabled = !enabled; });
    }

    /* ── Ronde spelen ─────────────────────── */
    function speelRonde(keuzeJij) {
      if (bezig || rondeNummer > 3) return;
      bezig = true;

      const idx       = rondeNummer - 1;
      const kaart     = document.getElementById(`kaart-${idx}`);
      const emojiJij  = document.getElementById(`emoji-jij-${idx}`);
      const emojiAI   = document.getElementById(`emoji-ai-${idx}`);
      const uitslagEl = document.getElementById(`uitslag-${idx}`);

      setBolKnoppen(false);
      document.querySelectorAll('.keuze-knop').forEach(k => {
        if (k.dataset.keuze === keuzeJij) k.classList.add('geselecteerd');
      });

      // Reset uitslag
      uitslagEl.className  = 'kaart-uitslag';
      uitslagEl.textContent = '';

      // Countdown animatie in de actieve kaart
      const tellen = ['✊', '✊✊', '✊✊✊'];
      let teller = 0;
      const interval = setInterval(() => {
        emojiJij.textContent = tellen[teller];
        emojiAI.textContent  = tellen[teller];
        emojiJij.classList.remove('schud');
        emojiAI.classList.remove('schud');
        void emojiJij.offsetWidth; // reflow voor herstart animatie
        emojiJij.classList.add('schud');
        emojiAI.classList.add('schud');
        teller++;
        if (teller >= 3) clearInterval(interval);
      }, 280);

      // Onthulling na 900ms
      setTimeout(() => {
        const keuzeAI = KEUZES[Math.floor(Math.random() * 3)];
        emojiJij.textContent = EMOJI[keuzeJij];
        emojiAI.textContent  = EMOJI[keuzeAI];
        emojiJij.classList.remove('schud');
        emojiAI.classList.remove('schud');

        const uitslag = bepaalWinnaar(keuzeJij, keuzeAI);
        rondeResults.push(uitslag);

        // Kaart-stijl updaten
        kaart.className = `ronde-kaart ${uitslag}`;

        // Uitslag-label in kaart
        uitslagEl.className = `kaart-uitslag ${uitslag}`;
        uitslagEl.textContent =
          uitslag === 'win'     ? '✓ Jij wint!' :
          uitslag === 'verlies' ? '✗ AI wint!'  : '= Gelijk!';

        const wasLaatsteRonde = (rondeNummer === 3);
        rondeNummer++;

        if (wasLaatsteRonde) {
          setBolKnoppen(false);
          setTimeout(toonEindstand, 750);
        } else {
          // Activeer volgende kaart
          document.getElementById(`kaart-${rondeNummer - 1}`).classList.add('actief');
          setTimeout(() => {
            document.querySelectorAll('.keuze-knop').forEach(k => k.classList.remove('geselecteerd'));
            setBolKnoppen(true);
            bezig = false;
          }, 650);
        }
      }, 900);
    }

    /* ── Eindstand tonen ──────────────────── */
    function toonEindstand() {
      const jijWins = rondeResults.filter(r => r === 'win').length;
      const aiWins  = rondeResults.filter(r => r === 'verlies').length;
      const gelijks = 3 - jijWins - aiWins;

      let matchUitslag;
      if      (jijWins > aiWins) { matchUitslag = 'win';     matchJij++;    }
      else if (aiWins > jijWins) { matchUitslag = 'verlies'; matchAI++;     }
      else                       { matchUitslag = 'gelijk';  matchGelijk++; }

      document.getElementById('score-jij').textContent    = matchJij;
      document.getElementById('score-gelijk').textContent = matchGelijk;
      document.getElementById('score-ai').textContent     = matchAI;

      const eindstand = document.getElementById('eindstand');
      eindstand.className = `eindstand toon ${matchUitslag}`;

      document.getElementById('eindstand-emoji').textContent =
        matchUitslag === 'win' ? '🏆' : matchUitslag === 'verlies' ? '🤖' : '🤝';

      document.getElementById('eindstand-titel').textContent =
        matchUitslag === 'win'     ? 'Jij wint de match!' :
        matchUitslag === 'verlies' ? 'AI wint de match!'  : 'Gelijkspel!';

      const subDelen = [];
      if (jijWins > 0)  subDelen.push(`Jij: ${jijWins}×✓`);
      if (aiWins > 0)   subDelen.push(`AI: ${aiWins}×✗`);
      if (gelijks > 0)  subDelen.push(`${gelijks}×=`);
      document.getElementById('eindstand-sub').textContent = subDelen.join('  ·  ');
    }

    /* ── Nieuw potje ──────────────────────── */
    function nieuwMatch() {
      rondeNummer  = 1;
      rondeResults = [];
      bezig        = false;

      // Reset alle kaarten
      for (let i = 0; i < 3; i++) {
        document.getElementById(`kaart-${i}`).className = 'ronde-kaart' + (i === 0 ? ' actief' : '');
        document.getElementById(`emoji-jij-${i}`).textContent = '❓';
        document.getElementById(`emoji-ai-${i}`).textContent  = '❓';
        const u = document.getElementById(`uitslag-${i}`);
        u.className   = 'kaart-uitslag';
        u.textContent = '';
      }

      document.getElementById('eindstand').className = 'eindstand';
      document.querySelectorAll('.keuze-knop').forEach(k => {
        k.disabled = false;
        k.classList.remove('geselecteerd');
      });
    }

    /* ── Events ───────────────────────────── */
    document.getElementById('keuze-rij').addEventListener('click', e => {
      const knop = e.target.closest('.keuze-knop');
      if (!knop || knop.disabled) return;
      speelRonde(knop.dataset.keuze);
    });

    document.getElementById('opnieuw').addEventListener('click', nieuwMatch);

    document.getElementById('reset').addEventListener('click', () => {
      matchJij = matchGelijk = matchAI = 0;
      document.getElementById('score-jij').textContent    = '0';
      document.getElementById('score-gelijk').textContent = '0';
      document.getElementById('score-ai').textContent     = '0';
      nieuwMatch();
    });
  </script>
</body>
</html>
