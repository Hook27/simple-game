<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rots-Papier-Schaar</title>
  <link rel="stylesheet" href="stijl.css">
  <style>
    .keuze-rij {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .keuze-knop {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, background 0.18s, box-shadow 0.18s;
      color: #e2e8f0;
      min-width: 90px;
    }

    .keuze-knop:hover {
      transform: translateY(-5px) scale(1.04);
      border-color: rgba(99,179,237,0.6);
      background: rgba(99,179,237,0.1);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(99,179,237,0.2);
    }

    .keuze-knop:active  { transform: scale(0.97); }
    .keuze-knop:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .keuze-knop.geselecteerd {
      border-color: #4299e1;
      background: rgba(66,153,225,0.15);
      box-shadow: 0 0 18px rgba(66,153,225,0.3);
    }

    .keuze-emoji { font-size: 2.1rem; line-height: 1; transition: transform 0.2s; }
    .keuze-knop:hover .keuze-emoji { transform: scale(1.15) rotate(-5deg); }
    .keuze-naam  { font-size: 0.85rem; font-weight: 600; }

    /* ── Bo3-tracker ───────────────────────── */
    .bo3-tracker {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .bo3-label {
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(144,205,244,0.5);
      margin-right: 4px;
    }

    .ronde-bol {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      border: 2px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.25);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .ronde-bol.huidig {
      border-color: #4299e1;
      color: #90cdf4;
      background: rgba(66,153,225,0.14);
      box-shadow: 0 0 10px rgba(66,153,225,0.3);
    }

    .ronde-bol.win {
      border-color: #38a169;
      background: rgba(56,161,105,0.22);
      color: #68d391;
      font-size: 1rem;
    }

    .ronde-bol.verlies {
      border-color: #e53e3e;
      background: rgba(229,62,62,0.18);
      color: #fc8181;
      font-size: 1rem;
    }

    .ronde-bol.gelijk {
      border-color: #ecc94b;
      background: rgba(236,201,75,0.15);
      color: #f6e05e;
      font-size: 1rem;
    }

    /* ── Arena ─────────────────────────────── */
    .arena {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 8px;
      min-height: 100px;
    }

    .arena-kant {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 110px;
    }

    .arena-label {
      font-size: 0.68rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #90cdf4;
    }

    .arena-emoji {
      font-size: 3.2rem;
      line-height: 1;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s;
    }

    .arena-emoji.schudden { animation: schud 0.5s ease-in-out; }

    @keyframes schud {
      0%,100% { transform: translateY(0) rotate(0); }
      20%     { transform: translateY(-12px) rotate(-8deg); }
      40%     { transform: translateY(-6px)  rotate(6deg); }
      60%     { transform: translateY(-10px) rotate(-5deg); }
      80%     { transform: translateY(-3px)  rotate(4deg); }
    }

    .vs-tekst {
      font-size: 1.4rem;
      font-weight: 900;
      color: rgba(255,255,255,0.18);
      user-select: none;
    }

    /* ── Resultaat huidige ronde ───────────── */
    .resultaat-balk {
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }

    .resultaat-badge {
      padding: 6px 20px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      animation: badge-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      opacity: 0;
    }

    .resultaat-badge.toon     { opacity: 1; }
    .resultaat-badge.gewonnen { background: rgba(56,161,105,0.2);  border: 1.5px solid #38a169; color: #68d391; }
    .resultaat-badge.verloren { background: rgba(229,62,62,0.15);  border: 1.5px solid #e53e3e; color: #fc8181; }
    .resultaat-badge.gelijk   { background: rgba(236,201,75,0.15); border: 1.5px solid #ecc94b; color: #f6e05e; }

    @keyframes badge-in {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Totaal scorebord (match-wins) ─────── */
    .score-rij {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .score-blok {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 10px;
      padding: 6px 16px;
      text-align: center;
      min-width: 82px;
    }

    .score-blok.gewonnen-blok { border-color: rgba(56,161,105,0.4); }
    .score-blok.verloren-blok { border-color: rgba(229,62,62,0.35); }
    .score-blok.gelijk-blok   { border-color: rgba(236,201,75,0.35); }

    .score-label  { color: #90cdf4; font-size: 0.62rem; letter-spacing: 1.2px; text-transform: uppercase; }
    .score-waarde { color: #fff; font-size: 1.2rem; font-weight: 700; line-height: 1.2; }

    .score-blok.gewonnen-blok .score-waarde { color: #68d391; }
    .score-blok.verloren-blok .score-waarde { color: #fc8181; }
    .score-blok.gelijk-blok   .score-waarde { color: #f6e05e; }

    /* ── Ronde-tekst ───────────────────────── */
    .rondes-tekst {
      color: rgba(144,205,244,0.65);
      font-size: 0.75rem;
      margin-bottom: 8px;
      letter-spacing: 0.4px;
    }

    .knoppen-rij { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    /* ── Popup uitbreiding (score-overzicht) ── */
    .popup-score-rij {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 12px 0 18px;
    }

    .popup-ronde-bol {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      border: 2px solid transparent;
    }

    .popup-ronde-bol.win     { background: rgba(56,161,105,0.25);  border-color: #38a169; color: #68d391; }
    .popup-ronde-bol.verlies { background: rgba(229,62,62,0.2);    border-color: #e53e3e; color: #fc8181; }
    .popup-ronde-bol.gelijk  { background: rgba(236,201,75,0.15);  border-color: #ecc94b; color: #f6e05e; }

    @media (max-width: 400px) {
      .keuze-knop { min-width: 76px; padding: 10px 14px; }
      .arena-kant { width: 90px; }
      .arena-emoji { font-size: 2.6rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🎮 <span>Spelletjes</span></a>
      <a href="geheugen-spel.html" class="nav-tab">Geheugen spel</a>
      <a href="vier-op-rij.html" class="nav-tab">Vier op een rij</a>
      <a href="rots-papier-schaar.html" class="nav-tab actief">Rots-Papier-Schaar</a>
    </div>
  </nav>

  <div class="pagina">
    <h1 class="spel-titel">Rots-Papier-Schaar</h1>
    <p class="spel-subtitel">Best of Three — wie wint 2 van de 3 rondes?</p>

    <!-- Totaal scorebord (match-wins over meerdere potjes) -->
    <div class="score-rij">
      <div class="score-blok gewonnen-blok">
        <div class="score-label">Jij gewonnen</div>
        <div class="score-waarde" id="score-jij">0</div>
      </div>
      <div class="score-blok gelijk-blok">
        <div class="score-label">Gelijk</div>
        <div class="score-waarde" id="score-gelijk">0</div>
      </div>
      <div class="score-blok verloren-blok">
        <div class="score-label">AI gewonnen</div>
        <div class="score-waarde" id="score-ai">0</div>
      </div>
    </div>

    <!-- Best-of-3 ronde tracker -->
    <div class="bo3-tracker">
      <span class="bo3-label">Rondes</span>
      <div class="ronde-bol" id="bol-0">R1</div>
      <div class="ronde-bol" id="bol-1">R2</div>
      <div class="ronde-bol" id="bol-2">R3</div>
    </div>

    <!-- Huidige ronde tekst -->
    <div class="rondes-tekst" id="rondes-tekst">Ronde 1 van 3 — Maak je keuze!</div>

    <!-- Arena -->
    <div class="arena">
      <div class="arena-kant">
        <div class="arena-label">Jij</div>
        <div class="arena-emoji" id="arena-jij">❓</div>
      </div>
      <div class="vs-tekst">VS</div>
      <div class="arena-kant">
        <div class="arena-label">AI</div>
        <div class="arena-emoji" id="arena-ai">❓</div>
      </div>
    </div>

    <!-- Resultaat huidige ronde -->
    <div class="resultaat-balk">
      <div class="resultaat-badge" id="resultaat-badge"></div>
    </div>

    <!-- Keuze-knoppen -->
    <div class="keuze-rij" id="keuze-rij">
      <button class="keuze-knop" data-keuze="rots">
        <span class="keuze-emoji">✊</span>
        <span class="keuze-naam">Rots</span>
      </button>
      <button class="keuze-knop" data-keuze="papier">
        <span class="keuze-emoji">🖐️</span>
        <span class="keuze-naam">Papier</span>
      </button>
      <button class="keuze-knop" data-keuze="schaar">
        <span class="keuze-emoji">✌️</span>
        <span class="keuze-naam">Schaar</span>
      </button>
    </div>

    <div class="knoppen-rij">
      <button class="knop gevaar" id="reset">Totaal resetten</button>
    </div>
  </div>

  <!-- Match-einde popup -->
  <div class="overlay" id="overlay">
    <div class="popup">
      <span class="popup-emoji" id="popup-emoji"></span>
      <div class="popup-titel" id="popup-titel"></div>
      <div class="popup-tekst" id="popup-tekst"></div>
      <!-- Ronde-overzicht in popup -->
      <div class="popup-score-rij" id="popup-score-rij"></div>
      <button class="knop" id="popup-opnieuw">Nieuwe match</button>
    </div>
  </div>

  <script>
    const KEUZES = ['rots', 'papier', 'schaar'];
    const EMOJI  = { rots: '✊', papier: '🖐️', schaar: '✌️' };

    // Match-totaalscore (over meerdere best-of-3 potjes)
    let matchJij = 0, matchGelijk = 0, matchAI = 0;

    // Huidige best-of-3
    let rondeNummer  = 1;   // 1–3
    let rondeResults = [];  // 'win' | 'verlies' | 'gelijk' per ronde
    let bezig        = false;

    /* ── Hulpfuncties ─────────────────────── */
    function bepaalWinnaar(jij, ai) {
      if (jij === ai) return 'gelijk';
      if ((jij === 'rots'   && ai === 'schaar') ||
          (jij === 'papier' && ai === 'rots')   ||
          (jij === 'schaar' && ai === 'papier')) return 'win';
      return 'verlies';
    }

    function setBolKnoppen(enabled) {
      document.querySelectorAll('.keuze-knop').forEach(k => { k.disabled = !enabled; });
    }

    /* ── Tracker updaten ──────────────────── */
    function updateTracker() {
      for (let i = 0; i < 3; i++) {
        const bol = document.getElementById(`bol-${i}`);
        bol.className = 'ronde-bol';
        if (i < rondeResults.length) {
          const r = rondeResults[i];
          bol.classList.add(r);
          bol.textContent = r === 'win' ? '✓' : r === 'verlies' ? '✗' : '=';
        } else if (i === rondeNummer - 1) {
          bol.classList.add('huidig');
          bol.textContent = `R${i + 1}`;
        } else {
          bol.textContent = `R${i + 1}`;
        }
      }
    }

    function updateRondeTekst() {
      document.getElementById('rondes-tekst').textContent =
        `Ronde ${rondeNummer} van 3 — Maak je keuze!`;
    }

    /* ── Ronde spelen ─────────────────────── */
    function speelRonde(keuzeJij) {
      if (bezig || rondeNummer > 3) return;
      bezig = true;

      setBolKnoppen(false);
      document.querySelectorAll('.keuze-knop').forEach(k => {
        if (k.dataset.keuze === keuzeJij) k.classList.add('geselecteerd');
      });

      const badge    = document.getElementById('resultaat-badge');
      const arenaJij = document.getElementById('arena-jij');
      const arenaAI  = document.getElementById('arena-ai');

      badge.className  = 'resultaat-badge';
      badge.textContent = '';
      arenaJij.textContent = '❓';
      arenaAI.textContent  = '❓';

      // Countdown animatie
      let teller = 0;
      const tellen = ['✊', '✊✊', '✊✊✊'];
      const interval = setInterval(() => {
        arenaJij.textContent = tellen[teller];
        arenaAI.textContent  = tellen[teller];
        arenaJij.classList.remove('schudden');
        arenaAI.classList.remove('schudden');
        void arenaJij.offsetWidth;
        arenaJij.classList.add('schudden');
        arenaAI.classList.add('schudden');
        teller++;
        if (teller >= 3) clearInterval(interval);
      }, 280);

      setTimeout(() => {
        const keuzeAI = KEUZES[Math.floor(Math.random() * 3)];
        arenaJij.textContent = EMOJI[keuzeJij];
        arenaAI.textContent  = EMOJI[keuzeAI];
        arenaJij.classList.remove('schudden');
        arenaAI.classList.remove('schudden');

        const uitslag = bepaalWinnaar(keuzeJij, keuzeAI);
        rondeResults.push(uitslag);
        updateTracker();

        // Toon ronde-resultaat
        if (uitslag === 'win') {
          badge.className   = 'resultaat-badge gewonnen toon';
          badge.textContent = '✓ Jij wint ronde ' + rondeNummer + '!';
        } else if (uitslag === 'verlies') {
          badge.className   = 'resultaat-badge verloren toon';
          badge.textContent = '✗ AI wint ronde ' + rondeNummer + '!';
        } else {
          badge.className   = 'resultaat-badge gelijk toon';
          badge.textContent = '= Gelijkspel in ronde ' + rondeNummer + '!';
        }

        const wasLaatsteRonde = rondeNummer === 3;
        rondeNummer++;

        if (wasLaatsteRonde) {
          // Wacht iets langer zodat de badge zichtbaar is, dan popup
          setTimeout(toonMatchEinde, 1300);
        } else {
          updateRondeTekst();
          setTimeout(() => {
            document.querySelectorAll('.keuze-knop').forEach(k => k.classList.remove('geselecteerd'));
            setBolKnoppen(true);
            bezig = false;
          }, 1100);
        }
      }, 900);
    }

    /* ── Match-einde ──────────────────────── */
    function toonMatchEinde() {
      const jijWins = rondeResults.filter(r => r === 'win').length;
      const aiWins  = rondeResults.filter(r => r === 'verlies').length;

      let matchUitslag;
      if      (jijWins > aiWins) { matchUitslag = 'win';     matchJij++;     }
      else if (aiWins > jijWins) { matchUitslag = 'verlies'; matchAI++;      }
      else                       { matchUitslag = 'gelijk';  matchGelijk++;  }

      // Update totaalbord
      document.getElementById('score-jij').textContent    = matchJij;
      document.getElementById('score-gelijk').textContent = matchGelijk;
      document.getElementById('score-ai').textContent     = matchAI;

      // Popup vullen
      const emoji = matchUitslag === 'win' ? '🏆' : matchUitslag === 'verlies' ? '🤖' : '🤝';
      const titel = matchUitslag === 'win' ? 'Jij wint de match!' :
                    matchUitslag === 'verlies' ? 'AI wint de match!' : 'Gelijkspel!';
      const tekst = matchUitslag === 'win'
        ? `Jij won ${jijWins} van de 3 rondes.`
        : matchUitslag === 'verlies'
          ? `De AI won ${aiWins} van de 3 rondes.`
          : `Elke ronde werd gelijkgespeeld of jullie staan gelijk.`;

      document.getElementById('popup-emoji').textContent = emoji;
      document.getElementById('popup-titel').textContent = titel;
      document.getElementById('popup-tekst').textContent = tekst;

      // Ronde-bollen in popup
      const scoreRij = document.getElementById('popup-score-rij');
      scoreRij.innerHTML = rondeResults.map(r => {
        const sym  = r === 'win' ? '✓' : r === 'verlies' ? '✗' : '=';
        return `<div class="popup-ronde-bol ${r}">${sym}</div>`;
      }).join('');

      document.getElementById('overlay').classList.add('toon');
    }

    /* ── Nieuwe match starten ─────────────── */
    function nieuwMatch() {
      rondeNummer  = 1;
      rondeResults = [];
      bezig        = false;

      document.getElementById('arena-jij').textContent = '❓';
      document.getElementById('arena-ai').textContent  = '❓';

      const badge = document.getElementById('resultaat-badge');
      badge.className  = 'resultaat-badge';
      badge.textContent = '';

      document.querySelectorAll('.keuze-knop').forEach(k => {
        k.disabled = false;
        k.classList.remove('geselecteerd');
      });

      updateTracker();
      updateRondeTekst();
      document.getElementById('overlay').classList.remove('toon');
    }

    /* ── Events ───────────────────────────── */
    document.getElementById('keuze-rij').addEventListener('click', e => {
      const knop = e.target.closest('.keuze-knop');
      if (!knop || knop.disabled) return;
      speelRonde(knop.dataset.keuze);
    });

    document.getElementById('popup-opnieuw').addEventListener('click', nieuwMatch);

    document.getElementById('reset').addEventListener('click', () => {
      matchJij = matchGelijk = matchAI = 0;
      document.getElementById('score-jij').textContent    = '0';
      document.getElementById('score-gelijk').textContent = '0';
      document.getElementById('score-ai').textContent     = '0';
      nieuwMatch();
    });

    /* ── Init ─────────────────────────────── */
    updateTracker();
  </script>
</body>
</html>
