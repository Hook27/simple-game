<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rots-Papier-Schaar</title>
  <link rel="stylesheet" href="stijl.css">
  <style>
    .keuze-rij {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .keuze-knop {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, background 0.18s, box-shadow 0.18s;
      color: #e2e8f0;
      min-width: 90px;
    }

    .keuze-knop:hover {
      transform: translateY(-5px) scale(1.04);
      border-color: rgba(99,179,237,0.6);
      background: rgba(99,179,237,0.1);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(99,179,237,0.2);
    }

    .keuze-knop:active { transform: scale(0.97); }

    .keuze-knop:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .keuze-knop.geselecteerd {
      border-color: #4299e1;
      background: rgba(66,153,225,0.15);
      box-shadow: 0 0 20px rgba(66,153,225,0.3);
    }

    .keuze-emoji {
      font-size: 2.1rem;
      line-height: 1;
      transition: transform 0.2s;
    }

    .keuze-knop:hover .keuze-emoji { transform: scale(1.15) rotate(-5deg); }

    .keuze-naam {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ── Arena ─────────────────────────────── */
    .arena {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 10px;
      min-height: 100px;
    }

    .arena-kant {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 110px;
    }

    .arena-label {
      font-size: 0.72rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #90cdf4;
    }

    .arena-emoji {
      font-size: 3.2rem;
      line-height: 1;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s;
    }

    .arena-emoji.schudden {
      animation: schud 0.5s ease-in-out;
    }

    @keyframes schud {
      0%,100% { transform: translateY(0) rotate(0); }
      20%     { transform: translateY(-12px) rotate(-8deg); }
      40%     { transform: translateY(-6px) rotate(6deg); }
      60%     { transform: translateY(-10px) rotate(-5deg); }
      80%     { transform: translateY(-3px) rotate(4deg); }
    }

    .vs-tekst {
      font-size: 1.5rem;
      font-weight: 900;
      color: rgba(255,255,255,0.2);
      user-select: none;
    }

    /* ── Resultaat ─────────────────────────── */
    .resultaat-balk {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .resultaat-badge {
      padding: 7px 22px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      animation: badge-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      opacity: 0;
    }

    .resultaat-badge.toon { opacity: 1; }

    .resultaat-badge.gewonnen {
      background: rgba(56,161,105,0.2);
      border: 1.5px solid #38a169;
      color: #68d391;
    }

    .resultaat-badge.verloren {
      background: rgba(229,62,62,0.15);
      border: 1.5px solid #e53e3e;
      color: #fc8181;
    }

    .resultaat-badge.gelijk {
      background: rgba(236,201,75,0.15);
      border: 1.5px solid #ecc94b;
      color: #f6e05e;
    }

    @keyframes badge-in {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Score rij ─────────────────────────── */
    .score-rij {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .score-blok {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 10px;
      padding: 6px 16px;
      text-align: center;
      min-width: 82px;
    }

    .score-blok.gewonnen-blok { border-color: rgba(56,161,105,0.4); }
    .score-blok.verloren-blok { border-color: rgba(229,62,62,0.35); }
    .score-blok.gelijk-blok   { border-color: rgba(236,201,75,0.35); }

    .score-label { color: #90cdf4; font-size: 0.65rem; letter-spacing: 1.2px; text-transform: uppercase; }
    .score-waarde { color: #fff; font-size: 1.2rem; font-weight: 700; line-height: 1.2; }

    .score-blok.gewonnen-blok .score-waarde { color: #68d391; }
    .score-blok.verloren-blok .score-waarde { color: #fc8181; }
    .score-blok.gelijk-blok   .score-waarde { color: #f6e05e; }

    /* ── Rondes ────────────────────────────── */
    .rondes-tekst {
      color: rgba(144,205,244,0.6);
      font-size: 0.75rem;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .knoppen-rij { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    @media (max-width: 400px) {
      .keuze-knop { min-width: 76px; padding: 10px 14px; }
      .arena-kant { width: 90px; }
      .arena-emoji { font-size: 2.6rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🎮 <span>Spelletjes</span></a>
      <a href="geheugen-spel.html" class="nav-tab">Geheugen spel</a>
      <a href="vier-op-rij.html" class="nav-tab">Vier op een rij</a>
      <a href="rots-papier-schaar.html" class="nav-tab actief">Rots-Papier-Schaar</a>
    </div>
  </nav>

  <div class="pagina">
    <h1 class="spel-titel">Rots-Papier-Schaar</h1>
    <p class="spel-subtitel">Kies je wapen en versla de AI!</p>

    <!-- Score -->
    <div class="score-rij">
      <div class="score-blok gewonnen-blok">
        <div class="score-label">Jij wint</div>
        <div class="score-waarde" id="score-jij">0</div>
      </div>
      <div class="score-blok gelijk-blok">
        <div class="score-label">Gelijk</div>
        <div class="score-waarde" id="score-gelijk">0</div>
      </div>
      <div class="score-blok verloren-blok">
        <div class="score-label">AI wint</div>
        <div class="score-waarde" id="score-ai">0</div>
      </div>
    </div>

    <div class="rondes-tekst" id="rondes-tekst">Ronde 1 — Maak je keuze!</div>

    <!-- Arena: jij vs AI -->
    <div class="arena">
      <div class="arena-kant">
        <div class="arena-label">Jij</div>
        <div class="arena-emoji" id="arena-jij">❓</div>
      </div>
      <div class="vs-tekst">VS</div>
      <div class="arena-kant">
        <div class="arena-label">AI</div>
        <div class="arena-emoji" id="arena-ai">❓</div>
      </div>
    </div>

    <!-- Resultaat -->
    <div class="resultaat-balk">
      <div class="resultaat-badge" id="resultaat-badge"></div>
    </div>

    <!-- Keuze-knoppen -->
    <div class="keuze-rij" id="keuze-rij">
      <button class="keuze-knop" data-keuze="rots">
        <span class="keuze-emoji">✊</span>
        <span class="keuze-naam">Rots</span>
      </button>
      <button class="keuze-knop" data-keuze="papier">
        <span class="keuze-emoji">🖐️</span>
        <span class="keuze-naam">Papier</span>
      </button>
      <button class="keuze-knop" data-keuze="schaar">
        <span class="keuze-emoji">✌️</span>
        <span class="keuze-naam">Schaar</span>
      </button>
    </div>

    <div class="knoppen-rij">
      <button class="knop gevaar" id="reset">Score resetten</button>
    </div>
  </div>

  <script>
    const KEUZES = ['rots', 'papier', 'schaar'];
    const EMOJI = { rots: '✊', papier: '🖐️', schaar: '✌️' };
    const NAAM  = { rots: 'Rots', papier: 'Papier', schaar: 'Schaar' };

    let scoreJij = 0, scoreGelijk = 0, scoreAI = 0, ronde = 1, bezig = false;

    // rots  versloeg schaar → rots wint
    // papier versloeg rots   → papier wint
    // schaar versloeg papier → schaar wint
    function bepaalWinnaar(jij, ai) {
      if (jij === ai) return 'gelijk';
      if ((jij === 'rots'   && ai === 'schaar') ||
          (jij === 'papier' && ai === 'rots')   ||
          (jij === 'schaar' && ai === 'papier')) return 'win';
      return 'verlies';
    }

    function speelRonde(keuzeJij) {
      if (bezig) return;
      bezig = true;

      // Geef alle knoppen disabled
      document.querySelectorAll('.keuze-knop').forEach(k => {
        k.disabled = true;
        if (k.dataset.keuze === keuzeJij) k.classList.add('geselecteerd');
      });

      // Verberg oud resultaat
      const badge = document.getElementById('resultaat-badge');
      badge.className = 'resultaat-badge';
      badge.textContent = '';

      // Laat vraagtekens zien en animeer schudden
      const arenaJij = document.getElementById('arena-jij');
      const arenaAI  = document.getElementById('arena-ai');
      arenaJij.textContent = '❓';
      arenaAI.textContent  = '❓';

      // Countdown animatie: 1-2-3
      let teller = 0;
      const tellen = ['✊', '✊✊', '✊✊✊'];
      const interval = setInterval(() => {
        arenaJij.textContent = tellen[teller] || '❓';
        arenaAI.textContent  = tellen[teller] || '❓';
        arenaJij.classList.remove('schudden');
        arenaAI.classList.remove('schudden');
        void arenaJij.offsetWidth; // reflow
        arenaJij.classList.add('schudden');
        arenaAI.classList.add('schudden');
        teller++;
        if (teller >= 3) clearInterval(interval);
      }, 280);

      setTimeout(() => {
        const keuzeAI = KEUZES[Math.floor(Math.random() * 3)];
        arenaJij.textContent = EMOJI[keuzeJij];
        arenaAI.textContent  = EMOJI[keuzeAI];
        arenaJij.classList.remove('schudden');
        arenaAI.classList.remove('schudden');

        const uitslag = bepaalWinnaar(keuzeJij, keuzeAI);

        if      (uitslag === 'win')     { scoreJij++;    badge.className = 'resultaat-badge gewonnen toon'; badge.textContent = '🏆 Jij wint!'; }
        else if (uitslag === 'verlies') { scoreAI++;     badge.className = 'resultaat-badge verloren toon'; badge.textContent = '🤖 AI wint!'; }
        else                            { scoreGelijk++; badge.className = 'resultaat-badge gelijk toon';   badge.textContent = '🤝 Gelijkspel!'; }

        document.getElementById('score-jij').textContent    = scoreJij;
        document.getElementById('score-gelijk').textContent = scoreGelijk;
        document.getElementById('score-ai').textContent     = scoreAI;

        ronde++;
        document.getElementById('rondes-tekst').textContent = `Ronde ${ronde} — Maak je keuze!`;

        // Knoppen weer aan na korte pauze
        setTimeout(() => {
          document.querySelectorAll('.keuze-knop').forEach(k => {
            k.disabled = false;
            k.classList.remove('geselecteerd');
          });
          bezig = false;
        }, 1200);

      }, 900);
    }

    document.getElementById('keuze-rij').addEventListener('click', (e) => {
      const knop = e.target.closest('.keuze-knop');
      if (!knop || knop.disabled) return;
      speelRonde(knop.dataset.keuze);
    });

    document.getElementById('reset').addEventListener('click', () => {
      scoreJij = scoreGelijk = scoreAI = 0;
      ronde = 1;
      document.getElementById('score-jij').textContent    = '0';
      document.getElementById('score-gelijk').textContent = '0';
      document.getElementById('score-ai').textContent     = '0';
      document.getElementById('rondes-tekst').textContent = 'Ronde 1 — Maak je keuze!';
      document.getElementById('arena-jij').textContent    = '❓';
      document.getElementById('arena-ai').textContent     = '❓';
      const badge = document.getElementById('resultaat-badge');
      badge.className = 'resultaat-badge';
      badge.textContent = '';
      document.querySelectorAll('.keuze-knop').forEach(k => {
        k.disabled = false;
        k.classList.remove('geselecteerd');
      });
      bezig = false;
    });
  </script>
</body>
</html>
